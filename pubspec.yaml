name: auth_demo
description: "A complete Flutter authentication demo app."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase & State Management
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  provider: ^6.1.2
  pinput: ^6.0.2
  get: ^4.7.3

  # Icons and Fonts
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
